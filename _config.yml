title: 黑の帽
description: blackhost78's Personal Blog
baseurl: ""

# ==================== 默认全局配置 ====================
defaults:
  - scope:
      path: ""
    values:
      jekyll-theme-WuK:
        default:
          html_lang: zh
          color-mode: auto
          light-theme: light
          dark-theme: dark
          menu:
            nav:
              - title: '首页 / Index'
                href: /
              - title: '归档 / Archive'
                href: /archive/
              - title: '标签 / Tags'
                href: /tags/
              - title: 'GitHub'
                href: https://github.com/blackhost78
            footer: |
              <div>
                <span id="busuanzi_container_site_pv">
                  <span id="busuanzi_value_site_pv"></span> visits
                </span>
                <span id="busuanzi_container_site_uv">
                  <span id="busuanzi_value_site_uv"></span> visitors
                </span>
                <script async src="https://cdn.jsdelivr.net/npm/busuanzi@2.3/bsz.pure.mini.js"></script>
              </div>
              <div>(C) 2017-2026 blackhost78</div>
          append_to_head:
            - |
              <meta http-equiv="content-type" content="text/html; charset=utf-8" />
              <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1" />
              <link rel="alternate" href="/feed.xml" title="RSS" type="application/rss+xml" />
            - |
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@primer/css@22.1.0/dist/primer.min.css" />
            - |
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pygments-rouge-css@0.1.0/perldoc.min.css" />
            - |
              <style>
                .loader {
                  width: calc(6*30px);
                  height: 50px;
                  display: flex;
                  filter: drop-shadow(30px 25px 0 currentColor) drop-shadow(60px 0 0 currentColor) drop-shadow(120px 0 0 currentColor);
                  clip-path: inset(0 100% 0 0);
                  animation: l12 2s infinite steps(7);
                }
                .loader:before {
                  content: "";
                  width: 30px;
                  height: 25px;
                  --c:no-repeat radial-gradient(farthest-side,currentColor 92%,#0000);
                  background: var(--c) left /70% 70%, var(--c) right/20% 20%, var(--c) top 0 right 15%/20% 20%, var(--c) bottom 0 right 15%/20% 20%;
                }
                @keyframes l12 { 100% {clip-path: inset(0 -30px 0 0)} }
                #wrap-loader {
                  width: 100vw;
                  height: 100vh;
                  position: fixed;
                  top: 0;
                  left: 0;
                  z-index: 999;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                }
                :root { --fgColor-default: Black; --bgColor-default: White; }
                @media (prefers-color-scheme: dark) { :root { --fgColor-default: White; --bgColor-default: Black; } }
                .loader { color: var(--fgColor-default); }
                #wrap-loader { background-color: var(--bgColor-default); }
              </style>
              <script>
                document.addEventListener("DOMContentLoaded", (event) => {
                  let x = document.getElementById("wrap-loader");
                  x.classList.add("fast", "anim-fade-out");
                  setTimeout('document.getElementById("wrap-loader").remove()', 300);
                });
              </script>
            - |
              <style>
                #wrap-content { min-height: 100vh; }
                body, .markdown-body {
                  font-family: "Monaspace Xenon", "极影毁片文宋 Medium", var(--fontStack-monospace, monospace);
                  font-feature-settings: "calt" 1, "liga" 1;
                }
              </style>
        page:
          title:
            enable: true
        post:
          date:
            enable: true
            prepend: post on
          wordcount:
            enable: true
            prepend: about
            unit: words
          readtime:
            enable: true
            prepend: require
            unit: min
            divided_by: 300
          copyright: |
            <br/>
            <a target="_blank" href="https://creativecommons.org/licenses/by/4.0/deed.zh" rel="license">CC BY 4.0</a>
            （除特别声明或转载文章外）

# ==================== 插件 ====================
plugins:
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-paginate
  - jekyll-remote-theme

remote_theme: https://github.com/wu-kan/jekyll-theme-WuK@5.5.0

readme_index:
  with_frontmatter: true

# ==================== 站点基础设置 ====================
permalink: pretty
timezone: Asia/Shanghai
future: true

# ==================== Markdown 引擎 ====================
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    block:
      disable: false
      line_numbers: true
    span:
      disable: false

# ==================== HTML 压缩 ====================
compress_html:
  clippings: all
  comments: []
  endings: all
  ignore:
    envs: all
  blanklines: false
  profile: false
  startings: []