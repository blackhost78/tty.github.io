title: 黑の帽
description: blackhost78's Personal Blog
baseurl: ""

# ==================== 默认全局配置 ====================
defaults:
  - scope:
      path: ""
    values:
      jekyll-theme-WuK:
        comments:
          append: |
            <div class="giscus">
              Loading comments...
            </div>
            <script src="https://giscus.app/client.js"
              data-repo="blackhost78/blackhost78.github.io"
              data-repo-id="MDEwOlJlcG9zaXRvcnkxNzIxMzc1OTQ="
              data-category="Announcements"
              data-category-id="DIC_kwDOCkKces4Clz9j"
              data-mapping="url"
              data-strict="0"
              data-reactions-enabled="1"
              data-emit-metadata="0"
              data-input-position="top"
              data-theme="preferred_color_scheme"
              data-lang="en"
              crossorigin="anonymous"
              async>
            </script>
        default:
          html_lang: zh
          color-mode: auto
          light-theme: light
          dark-theme: dark
          menu:
            nav:
              - title: '首页 / Index'
                href: /
              - title: '留言 / Comments'
                href: /comments/
              - title: '归档 / Archive'
                href: /archive/
              - title: '标签 / Tags'
                href: /tags/
              - title: '捐赠 / Donate'
                href: /donate/
              - title: 'GitHub'
                href: https://github.com/blackhost78
            footer: |
              <div>
                <span id="busuanzi_container_site_pv">
                  <span id="busuanzi_value_site_pv"></span>
                  visits
                </span>
                <span id="busuanzi_container_site_uv">
                  <span id="busuanzi_value_site_uv"></span>
                  vistors
                </span>
                <script
                  src="https://cdn.jsdelivr.net/npm/busuanzi@2.3/bsz.pure.mini.js"
                  async="async"
                ></script>
              </div>
              <div>
                (C) 2017-2026 blackhost78
              </div>
          jekyll-toc:
            enable: true
            prepend: |
              <style>
                #wrap-toc {
                  padding-left: 3em;
                }
              </style>
          prepend:
            - |
              <form class="SelectMenu-filter">
                <input
                  class="SelectMenu-input form-control"
                  type="text"
                  placeholder="Search"
                  aria-label="Filter"
                  id="wrap-search-input"
                />
                <ol class="px-5" id="wrap-search-result"></ol>
                <script
                  src="https://cdn.jsdelivr.net/npm/simple-jekyll-search@1.10.0/dest/simple-jekyll-search.min.js"
                  async="async"
                  onload='
                SimpleJekyllSearch({
                  json: "/assets/simple-jekyll-search/search.json",
                  searchInput: document.getElementById("wrap-search-input"),
                  resultsContainer: document.getElementById("wrap-search-result"),
                  searchResultTemplate: `<li><a href="{url}">{title}</a></li>`,
                  limit: 9
                })'
                ></script>
              </form>
          append_to_head:
            - |
              <style>
                .loader {
                  width: calc(6*30px);
                  height: 50px;
                  display: flex;
                  filter: drop-shadow(30px 25px 0 currentColor) drop-shadow(60px 0 0 currentColor) drop-shadow(120px 0 0 currentColor);
                  clip-path: inset(0 100% 0 0);
                  animation: l12 2s infinite steps(7);
                }
                .loader:before {
                  content: "";
                  width: 30px;
                  height: 25px;
                  --c:no-repeat radial-gradient(farthest-side,currentColor 92%,#0000);
                  background:
                    var(--c) left /70% 70%,
                    var(--c) right/20% 20%,
                    var(--c) top    0 right 15%/20% 20%,
                    var(--c) bottom 0 right 15%/20% 20%;
                }
                @keyframes l12 {
                  100% {clip-path: inset(0 -30px 0 0)}
                }
                #wrap-loader {
                  width: 100vw;
                  height: 100vh;
                  position: fixed;
                  top: 0;
                  left: 0;
                  z-index: 999;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                }
                :root {
                  --fgColor-default: Black;
                  --bgColor-default: White;
                }
                @media (prefers-color-scheme: dark) {
                  :root {
                    --fgColor-default: White;
                    --bgColor-default: Black;
                  }
                }
                .loader {
                  color: var(--fgColor-default);
                }
                #wrap-loader {
                  background-color: var(--bgColor-default);
                }
              </style>
              <script>
                document.addEventListener("DOMContentLoaded", (event) => {
                  let x = document.getElementById("wrap-loader");
                  x.classList.add("fast", "anim-fade-out");
                  setTimeout('document.getElementById("wrap-loader").remove()', 300);
              });
              </script>
            - |
              <meta
                http-equiv="content-type"
                content="text/html; charset=utf-8"
              />
              <meta
                name="viewport"
                content="width=device-width,minimum-scale=1,initial-scale=1"
              />
              <link
                rel="alternate"
                href="/feed.xml"
                title="RSS"
                type="application/rss+xml"
              />
            - |
              <link
                rel="stylesheet"
                href="https://cdn.jsdelivr.net/npm/@primer/css@22.1.0/dist/primer.min.css"
              />
            - |
              <link
                rel="stylesheet"
                href="https://cdn.jsdelivr.net/npm/pygments-rouge-css@0.1.0/perldoc.min.css"
              />
            - |
              <link
                rel="stylesheet"
                href="https://cdn.jsdelivr.net/npm/@fontsource/monaspace-xenon@5.2.5/index.min.css"
              />
              <link
                rel='stylesheet'
                href='https://unpkg.com/@chinese-fonts/jyhpws@2.0.0/dist/%E6%9E%81%E5%BD%B1%E6%AF%81%E7%89%87%E6%96%87%E5%AE%8B/result.css'
              />
              <style>
                body, .markdown-body {
                  font-family: "Monaspace Xenon", "极影毁片文宋 Medium", var(--fontStack-monospace, monospace);
                  font-feature-settings: "calt" 1, "liga" 1;
                }
              </style>
            - |
              <style>
                #wrap-content {
                  min-height: 100vh;
                }
              </style>
        page:
          title:
            enable: true
          prepend:
            - |
              <style>
                .markdown-body p {
                  text-indent: 2em;
                }
                .markdown-body img {
                  max-width: calc(100% - 4em);
                }
              </style>
            - |
              <style>
              .markdown-body .highlight pre,
              .markdown-body pre {
                  padding: 0;
                  background: none;
                }
              </style>
          plugin:
            - smart_include:
                enable: true
                key: $
              append: |
                <link
                  rel="stylesheet"
                  href="https://cdn.jsdelivr.net/npm/katex@0.16.27/dist/katex.min.css"
                />
                <style>
                  .katex-display>.katex {
                    white-space: normal;
                  }
                </style>
                <script
                  src="https://cdn.jsdelivr.net/combine/npm/katex@0.16.27/dist/katex.min.js,npm/katex@0.16.27/dist/contrib/auto-render.min.js"
                  async="async"
                  onload='renderMathInElement(document.body, { delimiters: [{left: "$$", right: "$$", display: true}, { left: "$", right: "$", display: false }, {left: "\\(", right: "\\)", display: false}, {left: "\\[", right: "\\]", display: true}]})'
                ></script>
            - smart_include:
                enable: true
                key: language-vega-lite
              append: |
                <style>
                  pre code.language-vega-lite {
                    display: none;
                  }
                </style>
                <script
                  src="https://cdn.jsdelivr.net/combine/npm/vega@6.2.0,npm/vega-lite@6.4.1,npm/vega-embed@7.1.0"
                  async="async"
                  onload='
                    for(let x of document.getElementsByClassName("language-vega-lite"))
                      if(x.nodeName=="CODE")
                      {
                        let m = document.createElement("div");
                        x.parentNode.insertAdjacentElement("beforebegin", m);
                        vegaEmbed(m, JSON.parse(x.textContent));
                      }'
                ></script>
            - smart_include:
                enable: true
                key: language-mermaid
              append: |
                <style>
                  pre code.language-mermaid {
                    display: none;
                  }
                </style>
                <script
                  src="https://cdn.jsdelivr.net/npm/mermaid@11.12.2/dist/mermaid.min.js"
                  async="async"
                  defer="defer"
                  onload='
                    for(let x of document.getElementsByClassName("language-mermaid"))
                      if(x.nodeName=="CODE")
                      {
                        let m = document.createElement("div");
                        m.classList.add("mermaid");
                        m.textContent = x.textContent;
                        x.parentNode.insertAdjacentElement("beforebegin", m);
                      }'
                ></script>
        post:
          date:
            enable: true
            prepend: post on
          wordcount:
            enable: true
            prepend: about
            unit: words
          readtime:
            enable: true
            prepend: require
            unit: min
            divided_by: 300
          copyright: |
            <br/>
            <a target="_blank"
              href="https://creativecommons.org/licenses/by/4.0/deed.zh"
              rel="license">
              CC BY 4.0
            </a>
            （除特别声明或转载文章外）
          related_posts:
            enable: true
        home:
          append_to_section_tag:
            - key: data-markdown
            - key: data-separator
              value: <!-- .slide -->
            - key: data-separator-vertical
              value: <!-- .slide vertical=true -->
          prepend: |
            <link
              rel="stylesheet"
              href="https://cdn.jsdelivr.net/combine/npm/reveal.js@5.2.1/dist/reveal.min.css,npm/reveal.js@5.2.1/dist/theme/serif.min.css"
            />
            <style>
              .reveal {
                font-feature-settings: "calt" 1, "liga" 1;
                --r-code-font: "Monaspace Xenon", "极影毁片文宋 Medium", var(--fontStack-monospace, monospace);
                --r-main-font: var(--r-code-font);
                --r-heading-font: var(--r-main-font);
                --r-main-color: var(--fgColor-default, var(--color-fg-default));
                --r-heading-color: var(--r-main-color);
                --r-link-color: var(--fgColor-accent, var(--color-accent-fg));
                --r-background-color: var(--bgColor-default, var(--color-canvas-default));
              }
              .reveal .slides {
                text-align: left;
              }
            </style>
          append: |
            <script
              src="https://cdn.jsdelivr.net/combine/npm/reveal.js@5.2.1/dist/reveal.min.js,npm/reveal.js@5.2.1/plugin/markdown/markdown.min.js,npm/reveal.js@5.2.1/plugin/math/math.min.js"
              defer="defer"
              onload="
              let x = document.getElementById('wrap-content');
              x.classList.add('reveal');
              Reveal.initialize({
                scrollActivationWidth: null,
                height: '100%',
                mouseWheel: true,
                navigationMode: 'linear',
                plugins: [ RevealMarkdown,RevealMath.KaTeX ]
              });
            "></script>

# ==================== 插件 ====================
plugins:
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-paginate
  - jekyll-remote-theme

remote_theme: https://github.com/wu-kan/jekyll-theme-WuK@5.5.0

readme_index:
  with_frontmatter: true

# ==================== 站点基础设置 ====================
permalink: pretty
timezone: Asia/Shanghai
future: true

# ==================== Markdown 引擎 ====================
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    block:
      disable: false
      line_numbers: true
    span:
      disable: false

# ==================== HTML 压缩 ====================
compress_html:
  clippings: all
  comments: []
  endings: all
  ignore:
    envs: all
  blanklines: false
  profile: false
  startings: []